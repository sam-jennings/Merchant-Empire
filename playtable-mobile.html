<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0810"/>
<title>Archmage Ascension — Mobile Sandbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/tokens.css">
<style>
  /* =========================================================================
     Archmage Ascension — Mobile portrait reflow of playtable.html
     All engine logic (cards, connectors, art) reused unchanged. Only the
     shell chrome / layout is reflowed.
     ========================================================================= */

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin:0; padding:0;
    min-height:100%;
    -webkit-text-size-adjust:100%;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background: var(--page-bg);
    color: var(--page-text);
    overflow-x:hidden;
    font-family: var(--font-body);
  }

  /* Surfaces (copied from desktop) */
  body {
    --surface-stage-bg:
      radial-gradient(ellipse at 50% 50%, rgba(200,168,74,.035) 0%, transparent 58%),
      linear-gradient(180deg, rgba(255,255,255,.012), rgba(255,255,255,0));
    --surface-stage-border: rgba(200,168,74,.08);
    --surface-stage-etch: rgba(200,168,74,.06);
    --surface-stage-ring: rgba(200,168,74,.05);
  }
  body[data-surface="velvet"] {
    background:
      radial-gradient(ellipse at 50% 34%, rgba(200,168,74,.06) 0%, rgba(200,168,74,.02) 22%, transparent 56%),
      radial-gradient(ellipse at 18% 22%, rgba(122,96,168,.08) 0%, transparent 48%),
      radial-gradient(ellipse at 84% 18%, rgba(88,62,126,.08) 0%, transparent 42%),
      linear-gradient(180deg, #120d1c 0%, #0a0810 58%, #05040a 100%);
    --surface-stage-bg:
      radial-gradient(ellipse at 50% 50%, rgba(200,168,74,.045) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 28%, rgba(122,96,168,.10) 0%, transparent 46%),
      radial-gradient(ellipse at 82% 20%, rgba(88,62,126,.08) 0%, transparent 40%),
      linear-gradient(180deg, rgba(27,18,42,.76), rgba(11,9,18,.82));
    --surface-stage-border: rgba(200,168,74,.12);
    --surface-stage-etch: rgba(200,168,74,.08);
    --surface-stage-ring: rgba(200,168,74,.06);
  }
  body[data-surface="obsidian"] {
    background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,.025) 0%, transparent 28%),
      linear-gradient(180deg, #101014 0%, #06060a 100%);
    --surface-stage-bg:
      radial-gradient(circle at 50% 36%, rgba(255,255,255,.03) 0%, transparent 26%),
      linear-gradient(180deg, rgba(23,23,29,.78), rgba(9,9,13,.88));
    --surface-stage-border: rgba(170,170,190,.10);
    --surface-stage-etch: rgba(170,170,190,.07);
    --surface-stage-ring: rgba(255,255,255,.05);
  }
  body[data-surface="wood"] {
    background:
      repeating-linear-gradient(90deg, rgba(48,28,14,.34) 0 34px, rgba(28,16,8,.34) 34px 68px),
      linear-gradient(180deg, #2a1b12 0%, #170f0a 100%);
    --surface-stage-bg:
      repeating-linear-gradient(90deg, rgba(82,52,28,.28) 0 32px, rgba(58,34,18,.28) 32px 64px),
      linear-gradient(180deg, rgba(60,39,24,.78), rgba(26,17,10,.86));
    --surface-stage-border: rgba(212,182,122,.14);
    --surface-stage-etch: rgba(212,182,122,.10);
    --surface-stage-ring: rgba(232,202,142,.07);
  }
  body[data-surface="parchment"] {
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.04) 0%, transparent 24%),
      radial-gradient(circle at 68% 76%, rgba(0,0,0,.04) 0%, transparent 26%),
      linear-gradient(180deg, #1a1512 0%, #0f0c0a 100%);
    --surface-stage-bg:
      radial-gradient(circle at 28% 24%, rgba(255,244,214,.05) 0%, transparent 24%),
      radial-gradient(circle at 70% 74%, rgba(0,0,0,.05) 0%, transparent 26%),
      linear-gradient(180deg, rgba(47,39,32,.76), rgba(19,16,14,.86));
    --surface-stage-border: rgba(230,214,174,.14);
    --surface-stage-etch: rgba(230,214,174,.10);
    --surface-stage-ring: rgba(255,244,214,.07);
  }

  /* ──────────────────────────────────────────────────────────────
     Mobile shell — single column, sticky top + bottom bars
     ────────────────────────────────────────────────────────────── */

  .shell-m {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-bottom: calc(64px + env(safe-area-inset-bottom)); /* space for bottom tab bar */
  }

  .topbar-m {
    position: sticky;
    top: 0;
    z-index: 40;
    padding: 10px 14px 8px;
    padding-top: calc(10px + env(safe-area-inset-top));
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    border-bottom:1px solid rgba(90,72,120,.35);
    background:linear-gradient(180deg, rgba(18,10,28,.96), rgba(10,8,16,.88));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .brand-m { display:flex; gap:10px; align-items:center; min-width:0; }
  .brand-m .glyph { color:var(--gold); font-size:16px; line-height:1; }
  .brand-m .name {
    font-family:var(--font-display);
    font-weight:700;
    font-size:13px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#c8b8e8;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .header-actions { display:flex; gap:6px; flex-shrink:0; }
  .icon-btn {
    width:36px; height:36px;
    border-radius:10px;
    border:1px solid rgba(74,56,104,.48);
    background:rgba(18,10,28,.54);
    color:#efe7d2;
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:.10em;
    text-transform:uppercase;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }
  .icon-btn.active { border-color:var(--gold); background:rgba(200,168,74,.14); color:var(--gold); }

  /* Scene — fills remaining space */
  .scene-wrap-m {
    flex:1;
    min-height: 0;
    padding: 12px 12px 8px;
    display:flex;
    flex-direction:column;
  }

  .panel-m {
    flex:1;
    display:flex;
    flex-direction:column;
    min-height: 0;
    border:1px solid rgba(74,56,104,.38);
    border-radius:14px;
    background:linear-gradient(180deg, rgba(18,10,28,.78), rgba(8,7,14,.78));
    box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(200,168,74,.03);
    overflow:hidden;
  }
  .panel-head-m {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:10px 12px 8px;
    border-bottom:1px solid rgba(74,56,104,.32);
    background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
  }
  .panel-title-m {
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:.20em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .panel-sub-m {
    font-family:var(--font-body);
    font-style:italic;
    font-size:11px;
    color:var(--page-text-soft);
    margin-top:2px;
    max-width: 100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .panel-tag-m {
    padding:3px 7px;
    border:1px solid rgba(90,72,120,.34);
    border-radius:999px;
    font-family:var(--font-display);
    font-size:8px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--page-text-soft);
    flex-shrink:0;
  }

  .scene-body-m {
    flex:1;
    min-height: 280px;
    padding: 10px 8px 14px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:auto;
  }
  .scene-stage-m {
    width:100%;
    min-height: 260px;
    border-radius:14px;
    border:1px solid var(--surface-stage-border);
    background: var(--surface-stage-bg);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
  }
  .stage-etch {
    position:absolute;
    inset:10px;
    border:1px solid var(--surface-stage-etch);
    border-radius:10px;
    pointer-events:none;
  }
  .stage-ring {
    position:absolute;
    width:min(440px, 78vw);
    aspect-ratio:1;
    border-radius:50%;
    border:1px solid var(--surface-stage-ring);
    pointer-events:none;
  }

  /* Scene content (reflowed for narrow viewport) */
  .cards-row, .cards-grid, .tableau-wrap, .strip-wrap, .single-wrap {
    position:relative;
    z-index:1;
  }
  .tableau-wrap {
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
    width:100%;
    padding:14px 8px;
  }
  .tableau-row {
    display:flex;
    align-items:flex-end;
    gap:6px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .strip-wrap {
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:20px 8px;
    width:100%;
    overflow:hidden;
  }
  .single-wrap {
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
  }
  .hand-scene {
    position:relative;
    width:100%;
    min-height: 320px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    overflow:visible;
    padding:10px 4px 22px;
  }

  .fan-card, .plain-card {
    position:relative;
    flex:0 0 auto;
    transition:transform .22s cubic-bezier(.2,.8,.2,1), filter .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s;
    filter:drop-shadow(0 5px 10px rgba(0,0,0,.45));
  }
  .fan-card.active,
  .plain-card.active {
    transform:translateY(-6px);
    filter:drop-shadow(0 12px 22px rgba(0,0,0,.55));
    z-index:20 !important;
  }
  .fan-card svg, .plain-card svg { display:block; }
  .card-meta {
    margin-top:6px;
    text-align:center;
    font-family:var(--font-display);
    font-size:8px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#cdbd98;
  }

  /* ──────────────────────────────────────────────────────────────
     Inspector — collapsible drawer above bottom tab bar
     ────────────────────────────────────────────────────────────── */
  .inspector-m {
    border-top:1px solid rgba(92,74,124,.40);
    background:linear-gradient(180deg, rgba(10,8,16,.92), rgba(6,5,10,.97));
    overflow:hidden;
    transition: max-height .28s ease;
    max-height: 44px;
  }
  .inspector-m.open { max-height: 340px; }
  .inspect-head {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 14px;
    cursor:pointer;
    user-select:none;
  }
  .inspect-head-left {
    display:flex; gap:8px; align-items:baseline;
    min-width: 0;
  }
  .inspect-head .title {
    font-family:var(--font-display);
    font-size:9px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--gold);
    flex-shrink: 0;
  }
  .inspect-head .name {
    font-family:var(--font-display);
    font-size:13px;
    letter-spacing:.06em;
    color:#dbcdf5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chev {
    font-size: 14px;
    color: #a894c2;
    transition: transform .2s ease;
    flex-shrink:0;
    margin-left:8px;
  }
  .inspector-m.open .chev { transform: rotate(180deg); }
  .inspect-body-m {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 12px;
    padding: 4px 14px 14px;
    align-items: start;
  }
  .inspect-card-m {
    display:flex;
    justify-content:center;
    align-items:center;
    padding:6px;
    border: 1px solid rgba(92,74,124,.24);
    border-radius: 10px;
    background: rgba(18,10,28,.42);
    overflow:hidden;
  }
  .inspect-meta-m {
    min-width: 0;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .inspect-copy-m {
    font-family:var(--font-body);
    font-size:12px;
    line-height:1.4;
    color:#d9ccba;
  }
  .inspect-grid-m {
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:6px;
  }
  .inspect-stat {
    padding:6px 8px;
    border:1px solid rgba(92,74,124,.34);
    border-radius:8px;
    background:rgba(18,10,28,.40);
  }
  .inspect-stat .k {
    font-family:var(--font-display);
    font-size:7px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#a894c2;
    margin-bottom:2px;
  }
  .inspect-stat .v {
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:.06em;
    color:var(--page-text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* ──────────────────────────────────────────────────────────────
     Bottom tab bar (fixed) — opens a section sheet
     ────────────────────────────────────────────────────────────── */
  .tabbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 50;
    height: calc(64px + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: linear-gradient(180deg, rgba(10,8,16,.88), rgba(6,5,10,.98));
    border-top: 1px solid rgba(74,56,104,.50);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .tab {
    background: transparent;
    border: 0;
    color: #a894c2;
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 10px 4px;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .tab .tab-dot {
    width:6px; height:6px; border-radius:999px; background: rgba(168,148,194,.35);
  }
  .tab.active { color: var(--gold); }
  .tab.active .tab-dot { background: var(--gold); box-shadow: 0 0 8px rgba(200,168,74,.55); }

  /* Sheet (controls drawer) */
  .sheet-scrim {
    position: fixed; inset: 0;
    background: rgba(4,3,8,.58);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 60;
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
  }
  .sheet-scrim.open { opacity: 1; pointer-events: auto; }

  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 61;
    max-height: 78vh;
    max-height: 78dvh;
    background: linear-gradient(180deg, #120a1c, #09070f 70%, #07060b 100%);
    border-top: 1px solid rgba(74,56,104,.50);
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    box-shadow: 0 -20px 46px rgba(0,0,0,.55);
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.2,.8,.2,1);
    display: flex;
    flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 44px; height: 4px;
    margin: 8px auto 4px;
    background: rgba(200,168,74,.30);
    border-radius: 999px;
  }
  .sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 16px 10px;
    border-bottom: 1px solid rgba(74,56,104,.30);
  }
  .sheet-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .sheet-close {
    border: 0;
    background: transparent;
    color: #cdbd98;
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 10px;
  }
  .sheet-body {
    overflow-y: auto;
    padding: 14px 16px calc(22px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  /* Control group styling — kept close to desktop for familiarity */
  .control-group {
    padding:12px;
    border:1px solid rgba(74,56,104,.30);
    border-radius:12px;
    background:rgba(18,10,28,.30);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .group-title {
    font-family:var(--font-display);
    font-size:9px;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:#b39ccb;
  }
  .seg-btns, .seg-stack {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .seg-btn, .toggle, .ghost-btn {
    border-radius:10px;
    border:1px solid rgba(74,56,104,.40);
    background:rgba(10,8,16,.44);
    color:var(--page-text-soft);
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    padding:10px 12px;
    cursor:pointer;
    transition:all .18s ease;
    min-height: 38px;
  }
  .seg-btn:active, .toggle:active, .ghost-btn:active { transform: scale(0.97); }
  .seg-btn.active, .toggle.active {
    border-color:var(--gold);
    background:rgba(200,168,74,.12);
    color:var(--gold);
  }
  .control-row {
    display:grid;
    grid-template-columns: 1fr auto;
    align-items:center;
    gap:10px;
  }
  .control-row label {
    font-family:var(--font-display);
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#e4d9c8;
  }
  .value-chip {
    min-width:52px;
    text-align:right;
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:.06em;
    color:#f1e7d7;
  }
  input[type="range"] {
    width:100%;
    accent-color: var(--gold);
    height: 32px;
  }
  select {
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid rgba(74,56,104,.38);
    background:#0f0c15;
    color:var(--page-text);
    font-family:var(--font-body);
    font-size:15px;
    min-height: 42px;
  }
  .per-suit-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:8px;
  }
  .tiny-note {
    font-family:var(--font-body);
    font-size:12px;
    color:#bdaecb;
    line-height:1.4;
  }
  .hand-builder {
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .hand-slot {
    display:grid;
    grid-template-columns: 58px 1fr 1fr;
    gap:6px;
    align-items:center;
  }
  .hand-slot-label {
    font-family:var(--font-display);
    font-size:9px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#d8cdb8;
  }

  .compare-unavailable {
    font-family:var(--font-body);
    font-size:12px;
    line-height:1.4;
    color:#bdaecb;
    padding:10px;
    border:1px dashed rgba(74,56,104,.48);
    border-radius:10px;
    background:rgba(10,8,16,.34);
  }

  .hidden { display:none !important; }

  #diag {
    position:fixed; top:10px; left:10px; right:10px; z-index:2000;
    background:#2a0a0a; border:1px solid #e8304a; color:#ffcfcf;
    padding:10px 12px; border-radius:6px; font-family:monospace;
    font-size:11px; display:none; white-space:pre-wrap; max-height:40vh; overflow:auto;
  }

  /* Tablet portrait — a bit more breathing room */
  @media (min-width: 620px) {
    .inspect-body-m { grid-template-columns: 180px 1fr; }
    .tabbar { max-width: 560px; margin: 0 auto; }
  }
</style>
</head>
<body data-surface="velvet">
<div id="diag"></div>
<div id="app"></div>

<script src="lib/cards.js"></script>
<script src="connectors/bloom-soft.js"></script>
<script src="connectors/parallelogram.js"></script>
<script src="connectors/notch.js"></script>
<script src="connectors/triangle.js"></script>
<script src="connectors/beacon.js"></script>
<script src="art/sigil.js"></script>
<script src="art/ritual.js"></script>
<script src="art/relic.js"></script>
<script src="art/emblem.js"></script>
<script src="art/runic.js"></script>

<script>
(function(){
  'use strict';

  function showDiag(msg){
    var el = document.getElementById('diag');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = (el.textContent ? el.textContent + '\n' : '') + msg;
  }
  window.addEventListener('error', function(e){
    // Silently swallow 404s for missing art files — they are expected on this version.
    var src = (e.filename || '') + '';
    if (/art\/(glyph|crystalline|engraved)\.js$/.test(src)) return;
    showDiag('⚠ ' + (e.message || e.error) + ' (' + src + ':' + (e.lineno||'') + ')');
  }, true);

  if (!window.ArchmageCards) {
    showDiag('ArchmageCards engine did not load. Check that lib/cards.js is reachable relative to this page.');
    return;
  }

  var ALL_CONNECTORS = Object.keys(window.AA_CONNECTORS || {});
  var ALL_ART = Object.keys(window.AA_ART || {});
  var ALL_LAYOUTS = Object.keys(window.ArchmageCards.LayoutVariants || {});

  if (!ALL_CONNECTORS.length) showDiag('No connectors registered.');
  if (!ALL_ART.length) showDiag('No art variants registered.');

  var ENERGY_ORDER = ['radiance','void','flux','aether'];
  var SURFACES = ['velvet','obsidian','wood','parchment'];
  var SCENES = ['single','grid','hand','strip'];
  var CARD_PRESETS = ['focus-sequence','same-value','same-current-mixed','mixed-currents','specific-hand'];

  var state = {
    scene: 'hand',
    cardPreset: 'mixed-currents',
    withWild: false,
    focusEnergy: 'radiance',
    focusValue: 7,
    surface: 'velvet',
    showLabels: false,
    hoverLift: true,
    cardCount: 5,            // lower default for portrait
    scale: 0.42,             // lower default for portrait
    overlap: 82,             // tighter default for narrow viewport
    fanSpread: 11,
    rowGap: 10,
    singleArtScale: 1,
    customHand: [
      { e:'radiance', v:7 },
      { e:'radiance', v:8 },
      { e:'radiance', v:9 },
      { e:'void', v:7 },
      { e:'flux', v:12 },
      { e:'aether', v:15 },
      { e:'wild', v:0 },
      { e:'radiance', v:3 },
      { e:'void', v:14 },
      { e:'flux', v:5 }
    ],
    primary: createVariantState('bloom-soft', 'sigil', 'classic'),
    inspect: {
      card: { e:'radiance', v:7, label:'Radiance 7' }
    },
    inspectorOpen: false,
    sheet: null                // null | 'scene' | 'cards' | 'design' | 'surface'
  };

  function pickInitial(wanted, list){
    return list.indexOf(wanted) !== -1 ? wanted : list[0];
  }

  function createVariantState(connector, art, layout){
    var chosenArt = pickInitial(art, ALL_ART);
    return {
      connector: pickInitial(connector, ALL_CONNECTORS),
      art: chosenArt,
      layout: pickInitial(layout, ALL_LAYOUTS),
      usePerSuitArt: false,
      artBySuit: {
        radiance: chosenArt,
        void: chosenArt,
        flux: chosenArt,
        aether: chosenArt
      },
      layoutFx: {
        connectorPlacement: 'same',
        separator: 'none',
        cornerGlyph: false,
        cornerLift: false,
        allCorners: false,
        mirroredLabel: false,
        innerFrame: false,
        cornerScale: 1,
        centreScale: 1
      }
    };
  }

  function syncVariantArts(variant, art){
    variant.art = art;
    if (!variant.usePerSuitArt) {
      variant.artBySuit.radiance = art;
      variant.artBySuit.void = art;
      variant.artBySuit.flux = art;
      variant.artBySuit.aether = art;
    }
  }
  function effectiveArtForCard(variant, card){
    if (!card || card.e === 'wild' || card.v === 0) return variant.art;
    return variant.usePerSuitArt ? (variant.artBySuit[card.e] || variant.art) : variant.art;
  }

  function snapshotScroll(){
    var sheetBody = document.querySelector('.sheet-body');
    return { sheet: sheetBody ? sheetBody.scrollTop : 0 };
  }
  function restoreScroll(pos){
    var sheetBody = document.querySelector('.sheet-body');
    if (sheetBody && pos.sheet) sheetBody.scrollTop = pos.sheet;
  }
  function rerender(){
    var pos = snapshotScroll();
    buildApp();
    restoreScroll(pos);
  }

  function cardLabel(card){
    if (card.e === 'wild' || card.v === 0) return 'Wild';
    return card.e.charAt(0).toUpperCase() + card.e.slice(1) + ' ' + card.v;
  }

  function clamp(n, lo, hi){ return Math.max(lo, Math.min(hi, n)); }
  function wrapValue(v){
    while (v < 1) v += 20;
    while (v > 20) v -= 20;
    return v;
  }
  function makeCardSpec(v, e, idx){
    return { key: e + '-' + v + '-' + idx, v: v, e: e };
  }

  function generateCards(){
    var cards = [];
    var e = state.focusEnergy;
    var v = state.focusValue;
    switch (state.cardPreset) {
      case 'focus-sequence':
        for (var i = -2; i <= 4; i++) cards.push(makeCardSpec(wrapValue(v + i), e, i + 2));
        break;
      case 'same-value':
        ENERGY_ORDER.forEach(function(en, i){ cards.push(makeCardSpec(v, en, i)); });
        break;
      case 'same-current-mixed':
        [2,5,8,11,14,17,20].forEach(function(base, i){ cards.push(makeCardSpec(base, e, i)); });
        break;
      case 'mixed-currents':
        for (var j = 0; j < 8; j++) cards.push(makeCardSpec(wrapValue(v - 1 + j), ENERGY_ORDER[j % ENERGY_ORDER.length], j));
        break;
      case 'specific-hand':
        cards = state.customHand.slice(0, Math.max(1, state.cardCount)).map(function(card, idx){
          return { key:(card.e||'wild') + '-' + (card.v||0) + '-' + idx, e: card.e, v: card.e === 'wild' ? 0 : clamp(card.v || 1, 1, 20) };
        });
        break;
      default:
        cards = [makeCardSpec(v, e, 0)];
    }
    cards = cards.slice(0, Math.max(1, state.cardCount));
    if (state.withWild && state.cardPreset !== 'specific-hand') {
      var wildPos = Math.floor(cards.length / 2);
      cards.splice(wildPos, 0, { key:'wild-injected', v:0, e:'wild' });
    }
    return cards;
  }

  function getSceneCards(){
    var cards = generateCards();
    if (state.scene === 'single') return [cards[0]];
    if (state.scene === 'strip') return cards.slice(0, Math.min(4, cards.length));
    return cards;
  }

  // Portrait tableau: 3 per row instead of 4 so cards don't shrink too aggressively
  function buildTableauRows(cards){
    var perRow = 3;
    if (cards.length <= perRow) return [cards];
    var rows = [];
    var i = 0;
    while (i < cards.length) {
      rows.push(cards.slice(i, i + perRow));
      i += perRow;
    }
    return rows;
  }

  function renderCard(card, variant, scale, tappable, panelKey){
    var wrap = document.createElement('div');
    wrap.className = 'plain-card';
    var effectiveArt = effectiveArtForCard(variant, card);
    var html = (card.e === 'wild' || card.v === 0)
      ? window.ArchmageCards.makeWildCard({ scale: scale, connector: variant.connector, art: variant.art, layout: variant.layout, layoutFx: variant.layoutFx })
      : window.ArchmageCards.makeCard(card.v, card.e, { scale: scale, connector: variant.connector, art: effectiveArt, layout: variant.layout, layoutFx: variant.layoutFx });
    wrap.innerHTML = html;
    if (tappable) {
      wrap.addEventListener('click', function(){
        setInspect(card, panelKey);
        openInspector();
      });
    }
    return wrap;
  }

  function renderLabeledCard(card, variant, scale, tappable, panelKey){
    var outer = document.createElement('div');
    outer.style.display = 'flex';
    outer.style.flexDirection = 'column';
    outer.style.alignItems = 'center';
    outer.style.gap = '0';
    outer.appendChild(renderCard(card, variant, scale, tappable, panelKey));
    if (state.showLabels) outer.appendChild(el('div', { class:'card-meta', text: cardLabel(card) }));
    return outer;
  }

  function renderSceneContent(cards, variant, panelKey){
    if (state.scene === 'single') {
      var s = el('div', { class:'single-wrap' });
      s.appendChild(renderLabeledCard(cards[0], variant, state.scale * 1.2 * state.singleArtScale, true, panelKey));
      return s;
    }

    if (state.scene === 'grid') {
      var table = el('div', { class:'tableau-wrap' });
      buildTableauRows(cards).forEach(function(rowCards){
        var rowEl = el('div', { class:'tableau-row' });
        rowEl.style.gap = state.rowGap + 'px';
        rowCards.forEach(function(card){ rowEl.appendChild(renderLabeledCard(card, variant, state.scale, true, panelKey)); });
        table.appendChild(rowEl);
      });
      return table;
    }

    if (state.scene === 'strip') {
      var strip = el('div', { class:'strip-wrap' });
      cards.forEach(function(card, idx){
        var cardWrap = renderLabeledCard(card, variant, state.scale, true, panelKey);
        if (idx < cards.length - 1) cardWrap.style.marginRight = '-' + state.overlap + 'px';
        cardWrap.style.position = 'relative';
        cardWrap.style.zIndex = String(idx + 1);
        strip.appendChild(cardWrap);
      });
      return strip;
    }

    // hand
    var hand = el('div', { class:'hand-scene' });
    var N = cards.length;
    var mid = (N - 1) / 2;
    // Portrait-tuned step (narrower than desktop)
    var maxStep = Math.max(14, 92 - state.overlap * 0.7);
    cards.forEach(function(card, i){
      var rot = (i - mid) * state.fanSpread;
      var x = (i - mid) * maxStep;
      var yLift = Math.abs(i - mid) * 2.2;
      var slot = renderLabeledCard(card, variant, state.scale, true, panelKey);
      slot.classList.remove('plain-card');
      slot.style.position = 'absolute';
      slot.style.left = 'calc(50% + ' + x + 'px)';
      slot.style.bottom = yLift + 'px';
      slot.style.transform = 'translateX(-50%) rotate(' + rot + 'deg)';
      slot.style.transformOrigin = '50% 140%';
      slot.style.zIndex = String(i + 1);
      hand.appendChild(slot);
    });
    return hand;
  }

  function setInspect(card, panelKey){
    state.inspect = { card: card, panel: panelKey || 'A' };
    renderInspector();
  }
  function openInspector(){
    if (state.inspectorOpen) { renderInspector(); return; }
    state.inspectorOpen = true;
    var ins = document.getElementById('inspector');
    if (ins) ins.classList.add('open');
    renderInspector();
  }
  function toggleInspector(){
    state.inspectorOpen = !state.inspectorOpen;
    var ins = document.getElementById('inspector');
    if (ins) ins.classList.toggle('open', state.inspectorOpen);
  }

  function getPanelSubtitle(variant){
    return [variant.layout, variant.connector, (variant.usePerSuitArt ? 'per-suit art' : variant.art)].join(' · ');
  }

  function buildPanel(title, variant, cards, panelKey){
    var panel = el('section', { class:'panel-m' });
    panel.appendChild(el('div', { class:'panel-head-m' }, [
      el('div', { style: { minWidth: '0' } }, [
        el('div', { class:'panel-title-m', text: title }),
        el('div', { class:'panel-sub-m', text: getPanelSubtitle(variant) })
      ]),
      el('div', { class:'panel-tag-m', text: state.scene })
    ]));

    var body = el('div', { class:'scene-body-m' });
    var stage = el('div', { class:'scene-stage-m' });
    stage.appendChild(el('div', { class:'stage-etch' }));
    stage.appendChild(el('div', { class:'stage-ring' }));
    stage.appendChild(renderSceneContent(cards, variant, panelKey));
    body.appendChild(stage);
    panel.appendChild(body);
    return panel;
  }

  function updateBodySurface(){
    document.body.setAttribute('data-surface', state.surface);
  }

  function el(tag, attrs, children){
    var node = document.createElement(tag);
    if (attrs) for (var k in attrs) {
      if (k === 'class') node.className = attrs[k];
      else if (k === 'text') node.textContent = attrs[k];
      else if (k === 'html') node.innerHTML = attrs[k];
      else if (k === 'style') for (var s in attrs[k]) node.style[s] = attrs[k][s];
      else if (k.indexOf('on') === 0) node.addEventListener(k.slice(2), attrs[k]);
      else node.setAttribute(k, attrs[k]);
    }
    if (children) children.forEach(function(child){ if (child) node.appendChild(child); });
    return node;
  }

  function segButtons(options, active, onPick){
    var host = el('div', { class:'seg-btns' });
    options.forEach(function(opt){
      host.appendChild(el('button', {
        class:'seg-btn' + (opt === active ? ' active' : ''),
        text: opt,
        onclick: function(){ onPick(opt); }
      }));
    });
    return host;
  }

  function makeRange(label, min, max, step, value, format, onInput){
    var wrap = el('div');
    var chip;
    wrap.appendChild(el('div', { class:'control-row' }, [
      el('label', { text: label }),
      chip = el('div', { class:'value-chip', text: format(value) })
    ]));
    var input = el('input', {
      type:'range', min:String(min), max:String(max), step:String(step), value:String(value)
    });
    input.addEventListener('input', function(ev){ chip.textContent = format(parseFloat(ev.target.value)); });
    input.addEventListener('change', function(ev){ onInput(parseFloat(ev.target.value)); });
    wrap.appendChild(input);
    return wrap;
  }

  function makeSelect(label, options, value, onChange){
    var wrap = el('div');
    wrap.appendChild(el('div', { class:'group-title', text: label }));
    var select = document.createElement('select');
    options.forEach(function(opt){
      var o = document.createElement('option');
      o.value = opt;
      o.textContent = opt;
      if (opt === value) o.selected = true;
      select.appendChild(o);
    });
    select.addEventListener('change', function(){ onChange(select.value); });
    wrap.appendChild(select);
    return wrap;
  }

  function makeHandBuilder(){
    var host = el('div', { class:'hand-builder' });
    for (var i = 0; i < Math.max(1, state.cardCount); i++) {
      (function(idx){
        var slot = state.customHand[idx] || { e:'radiance', v:1 };
        host.appendChild(el('div', { class:'hand-slot' }, [
          el('div', { class:'hand-slot-label', text:'Card ' + (idx + 1) }),
          (function(){
            var select = document.createElement('select');
            ['radiance','void','flux','aether','wild'].forEach(function(opt){
              var o = document.createElement('option');
              o.value = opt;
              o.textContent = opt;
              if (opt === slot.e) o.selected = true;
              select.appendChild(o);
            });
            select.addEventListener('change', function(){
              slot.e = select.value;
              if (slot.e === 'wild') slot.v = 0;
              if (slot.e !== 'wild' && (!slot.v || slot.v === 0)) slot.v = 1;
              state.customHand[idx] = { e: slot.e, v: slot.v };
              rerender();
            });
            return select;
          })(),
          (function(){
            if (slot.e === 'wild') {
              return el('div', { class:'value-chip', text:'wild' });
            }
            var select = document.createElement('select');
            for (var v = 1; v <= 20; v++) {
              var o = document.createElement('option');
              o.value = String(v);
              o.textContent = String(v);
              if (v === slot.v) o.selected = true;
              select.appendChild(o);
            }
            select.addEventListener('change', function(){
              slot.v = parseInt(select.value, 10);
              state.customHand[idx] = { e: slot.e, v: slot.v };
              rerender();
            });
            return select;
          })()
        ]));
      })(i);
    }
    return host;
  }

  // ──────────────────────────────────────────────────────────────
  // Section builders (each is rendered into the sheet body)
  // ──────────────────────────────────────────────────────────────
  function buildSceneSection(){
    var wrap = el('div', { style: { display:'flex', flexDirection:'column', gap:'14px' } });

    wrap.appendChild(el('div', { class:'control-group' }, [
      el('div', { class:'group-title', text:'Scene preset' }),
      segButtons(SCENES, state.scene, function(v){ state.scene = v; rerender(); }),
      el('div', { class:'tiny-note', text:'Single card, auto-flow grid, fan in hand, or heavy overlap strip.' })
    ]));

    var isHand   = state.scene === 'hand';
    var isStrip  = state.scene === 'strip';
    var isGrid   = state.scene === 'grid';
    var isSingle = state.scene === 'single';
    var children = [
      el('div', { class:'group-title', text:'Composition' }),
      makeRange('Card scale', 0.30, 0.78, 0.02, state.scale, function(n){ return n.toFixed(2) + '×'; }, function(v){ state.scale = v; rerender(); })
    ];
    if (isHand || isStrip) children.push(makeRange('Overlap', 20, 170, 2, state.overlap, function(n){ return Math.round(n) + ' px'; }, function(v){ state.overlap = Math.round(v); rerender(); }));
    if (isHand)   children.push(makeRange('Fan rotation', 4, 22, 1, state.fanSpread, function(n){ return Math.round(n) + '°'; }, function(v){ state.fanSpread = Math.round(v); rerender(); }));
    if (isGrid)   children.push(makeRange('Row gap', 4, 24, 1, state.rowGap, function(n){ return Math.round(n) + ' px'; }, function(v){ state.rowGap = Math.round(v); rerender(); }));
    if (isSingle) children.push(makeRange('Single zoom', 0.8, 1.45, 0.05, state.singleArtScale, function(n){ return n.toFixed(2) + '×'; }, function(v){ state.singleArtScale = v; rerender(); }));
    wrap.appendChild(el('div', { class:'control-group' }, children));

    return wrap;
  }

  function buildCardsSection(){
    var wrap = el('div', { style: { display:'flex', flexDirection:'column', gap:'14px' } });
    var isSingleScene = state.scene === 'single';
    var PRESETS_NEED_ENERGY = ['focus-sequence','same-current-mixed'];
    var PRESETS_NO_VALUE = ['same-current-mixed','specific-hand'];
    var presetNeedsFocusEnergy = PRESETS_NEED_ENERGY.indexOf(state.cardPreset) !== -1;
    var presetNeedsFocusValue  = PRESETS_NO_VALUE.indexOf(state.cardPreset) === -1;
    var showCount = !isSingleScene;

    var children = [
      el('div', { class:'group-title', text:'Card family' }),
      segButtons(CARD_PRESETS, state.cardPreset, function(v){ state.cardPreset = v; rerender(); })
    ];
    if (state.cardPreset !== 'specific-hand') {
      children.push(el('button', {
        class:'toggle' + (state.withWild ? ' active' : ''),
        text: 'Include wild',
        onclick:function(){ state.withWild = !state.withWild; rerender(); }
      }));
    }
    if (presetNeedsFocusEnergy) children.push(makeSelect('Focus current', ENERGY_ORDER, state.focusEnergy, function(v){ state.focusEnergy = v; rerender(); }));
    if (presetNeedsFocusValue)  children.push(makeRange('Focus value', 1, 20, 1, state.focusValue, function(n){ return String(Math.round(n)); }, function(v){ state.focusValue = Math.round(v); rerender(); }));
    if (showCount)              children.push(makeRange('Card count', 1, 10, 1, state.cardCount, function(n){ return String(Math.round(n)); }, function(v){ state.cardCount = Math.round(v); rerender(); }));
    children.push(state.cardPreset === 'specific-hand' ? makeHandBuilder() : el('div', { class:'tiny-note', text:'Use "specific-hand" to build an exact set of cards slot by slot.' }));
    wrap.appendChild(el('div', { class:'control-group' }, children));
    return wrap;
  }

  function buildDesignSection(){
    var wrap = el('div', { style: { display:'flex', flexDirection:'column', gap:'14px' } });
    var variant = state.primary;

    // Core design
    wrap.appendChild(el('div', { class:'control-group' }, [
      el('div', { class:'group-title', text:'Design A' }),
      makeSelect('Connector', ALL_CONNECTORS, variant.connector, function(v){ variant.connector = v; rerender(); }),
      makeSelect('Layout', ALL_LAYOUTS, variant.layout, function(v){ variant.layout = v; rerender(); }),
      makeSelect('Default art', ALL_ART, variant.art, function(v){ syncVariantArts(variant, v); rerender(); }),
      el('button', {
        class:'toggle' + (variant.usePerSuitArt ? ' active' : ''),
        text: 'Per-suit art',
        onclick:function(){ variant.usePerSuitArt = !variant.usePerSuitArt; rerender(); }
      }),
      (function(){
        if (!variant.usePerSuitArt) return null;
        var psGrid = el('div', { class:'per-suit-grid' });
        ['radiance','void','flux','aether'].forEach(function(suit){
          var w = el('div');
          w.appendChild(el('div', { class:'group-title', text: suit }));
          var sel = document.createElement('select');
          ALL_ART.forEach(function(opt){
            var o = document.createElement('option');
            o.value = opt; o.textContent = opt;
            if (opt === variant.artBySuit[suit]) o.selected = true;
            sel.appendChild(o);
          });
          sel.addEventListener('change', function(){ variant.artBySuit[suit] = sel.value; rerender(); });
          w.appendChild(sel);
          psGrid.appendChild(w);
        });
        return psGrid;
      })()
    ]));

    // Layout experiments
    var fx = variant.layoutFx;
    function fxRerender(){ rerender(); }

    var fxGroup = el('div', { class:'control-group' }, [
      el('div', { class:'group-title', text:'Layout experiments' }),

      el('div', { class:'group-title', text:'Connector placement' }),
      segButtons(['same','mirrored','left-only'], fx.connectorPlacement, function(v){ fx.connectorPlacement = v; fxRerender(); }),

      el('div', { class:'group-title', text:'Separator margin' }),
      segButtons(['none','line','band'], fx.separator, function(v){ fx.separator = v; fxRerender(); })
    ]);

    var fxToggles = el('div', { class:'seg-stack' });
    [['Corner glyph','cornerGlyph'],['Corner lift','cornerLift'],['Four corners','allCorners'],['Top label','mirroredLabel'],['Inner frame','innerFrame']].forEach(function(pair){
      fxToggles.appendChild(el('button', {
        class: 'toggle' + (fx[pair[1]] ? ' active' : ''),
        text: pair[0],
        onclick: (function(key){ return function(){ fx[key] = !fx[key]; fxRerender(); }; })(pair[1])
      }));
    });
    fxGroup.appendChild(fxToggles);

    fxGroup.appendChild(makeRange('Corner scale', 0.8, 1.5, 0.05, fx.cornerScale,
      function(n){ return n.toFixed(2)+'×'; },
      function(v){ fx.cornerScale = v; fxRerender(); }
    ));
    fxGroup.appendChild(makeRange('Centre scale', 0.8, 1.5, 0.05, fx.centreScale,
      function(n){ return n.toFixed(2)+'×'; },
      function(v){ fx.centreScale = v; fxRerender(); }
    ));
    wrap.appendChild(fxGroup);

    wrap.appendChild(el('div', { class:'compare-unavailable', text: 'Side-by-side compare is desktop-only. Rotate the phone or use the desktop sandbox to A/B two designs.' }));

    return wrap;
  }

  function buildSurfaceSection(){
    var wrap = el('div', { style: { display:'flex', flexDirection:'column', gap:'14px' } });
    wrap.appendChild(el('div', { class:'control-group' }, [
      el('div', { class:'group-title', text:'Surface' }),
      segButtons(SURFACES, state.surface, function(v){ state.surface = v; rerender(); }),
      el('div', { class:'tiny-note', text:'Changes how luminous or legible the cards feel in practice, especially when overlapped.' })
    ]));

    wrap.appendChild(el('div', { class:'control-group' }, [
      el('div', { class:'group-title', text:'View options' }),
      el('button', {
        class:'toggle' + (state.showLabels ? ' active' : ''),
        text: 'Card labels under each card',
        onclick:function(){ state.showLabels = !state.showLabels; rerender(); }
      }),
      el('button', {
        class:'toggle' + (state.hoverLift ? ' active' : ''),
        text: 'Hover lift (desktop hint)',
        onclick:function(){ state.hoverLift = !state.hoverLift; rerender(); }
      })
    ]));

    return wrap;
  }

  function renderInspector(){
    var host = document.getElementById('inspector');
    if (!host) return;
    host.innerHTML = '';
    host.classList.toggle('open', !!state.inspectorOpen);

    var variant = state.primary;
    var card = state.inspect.card;
    var inspectArt = effectiveArtForCard(variant, card);

    host.appendChild(el('div', { class:'inspect-head', onclick: toggleInspector }, [
      el('div', { class: 'inspect-head-left' }, [
        el('span', { class:'title', text:'Inspect' }),
        el('span', { class:'name', text: cardLabel(card) })
      ]),
      el('span', { class:'chev', text: '▾' })
    ]));

    if (!state.inspectorOpen) return;

    var cardHtml = (card.e === 'wild' || card.v === 0)
      ? window.ArchmageCards.makeWildCard({ scale: 0.50, connector: variant.connector, art: variant.art, layout: variant.layout, layoutFx: variant.layoutFx })
      : window.ArchmageCards.makeCard(card.v, card.e, { scale: 0.50, connector: variant.connector, art: inspectArt, layout: variant.layout, layoutFx: variant.layoutFx });

    var copy = card.e === 'wild'
      ? 'Convergence preview for the current connector and layout.'
      : 'Larger isolated read for the selected card.';

    host.appendChild(el('div', { class:'inspect-body-m' }, [
      el('div', { class:'inspect-card-m', html: cardHtml }),
      el('div', { class:'inspect-meta-m' }, [
        el('div', { class:'inspect-copy-m', text: copy }),
        el('div', { class:'inspect-grid-m' }, [
          stat('Current', card.e === 'wild' ? 'wild' : card.e),
          stat('Value', card.v === 0 ? 'wild' : String(card.v)),
          stat('Layout', variant.layout),
          stat('Art', inspectArt),
          stat('Connector', variant.connector),
          stat('Scale', state.scale.toFixed(2) + '×'),
          stat('Scene', state.scene),
          stat('Surface', state.surface)
        ])
      ])
    ]));
  }

  function stat(key, value){
    return el('div', { class:'inspect-stat' }, [
      el('div', { class:'k', text:key }),
      el('div', { class:'v', text:value })
    ]);
  }

  // ──────────────────────────────────────────────────────────────
  // Sheet open/close
  // ──────────────────────────────────────────────────────────────
  function openSheet(name){
    state.sheet = name;
    renderSheet();
  }
  function closeSheet(){
    state.sheet = null;
    renderSheet();
  }

  function renderSheet(){
    var scrim = document.getElementById('scrim');
    var sheet = document.getElementById('sheet');
    var body  = document.getElementById('sheetBody');
    var title = document.getElementById('sheetTitle');
    if (!sheet || !body || !scrim) return;

    body.innerHTML = '';
    if (state.sheet === 'scene')   { title.textContent = 'Scene';   body.appendChild(buildSceneSection()); }
    if (state.sheet === 'cards')   { title.textContent = 'Cards';   body.appendChild(buildCardsSection()); }
    if (state.sheet === 'design')  { title.textContent = 'Design';  body.appendChild(buildDesignSection()); }
    if (state.sheet === 'surface') { title.textContent = 'Surface'; body.appendChild(buildSurfaceSection()); }

    var open = !!state.sheet;
    sheet.classList.toggle('open', open);
    scrim.classList.toggle('open', open);

    // Update tabbar active state
    ['scene','cards','design','surface'].forEach(function(n){
      var b = document.getElementById('tab-' + n);
      if (b) b.classList.toggle('active', state.sheet === n);
    });
  }

  // ──────────────────────────────────────────────────────────────
  // App build
  // ──────────────────────────────────────────────────────────────
  function buildApp(){
    updateBodySurface();

    var cards = getSceneCards();
    if (!cards.length) cards = [makeCardSpec(state.focusValue, state.focusEnergy, 0)];
    if (!state.inspect.card || !cards.some(function(c){ return c.key === state.inspect.card.key; })) {
      state.inspect.card = cards[0];
    }

    var app = document.getElementById('app');
    app.innerHTML = '';

    var shell = el('div', { class:'shell-m' });

    // Topbar
    shell.appendChild(el('header', { class:'topbar-m' }, [
      el('div', { class:'brand-m' }, [
        el('span', { class:'glyph', text:'✦' }),
        el('div', { class:'name', text:'Archmage Ascension' })
      ]),
      el('div', { class:'header-actions' }, [
        el('button', {
          class:'icon-btn' + (state.showLabels ? ' active' : ''),
          text:'Aa',
          title:'Toggle card labels',
          'aria-label':'Toggle card labels',
          onclick:function(){ state.showLabels = !state.showLabels; rerender(); }
        })
      ])
    ]));

    // Scene
    var sceneWrap = el('div', { class:'scene-wrap-m' });
    sceneWrap.appendChild(buildPanel('Scene', state.primary, cards, 'A'));
    shell.appendChild(sceneWrap);

    // Inspector drawer
    shell.appendChild(el('section', { class:'inspector-m' + (state.inspectorOpen ? ' open' : ''), id:'inspector' }));

    // Bottom tab bar
    shell.appendChild(el('nav', { class:'tabbar', 'aria-label':'Section tabs' }, [
      el('button', { class:'tab', id:'tab-scene',   onclick:function(){ openSheet(state.sheet==='scene'?null:'scene'); } },
        [el('div', { class:'tab-dot' }), el('div', { text:'Scene' })]),
      el('button', { class:'tab', id:'tab-cards',   onclick:function(){ openSheet(state.sheet==='cards'?null:'cards'); } },
        [el('div', { class:'tab-dot' }), el('div', { text:'Cards' })]),
      el('button', { class:'tab', id:'tab-design',  onclick:function(){ openSheet(state.sheet==='design'?null:'design'); } },
        [el('div', { class:'tab-dot' }), el('div', { text:'Design' })]),
      el('button', { class:'tab', id:'tab-surface', onclick:function(){ openSheet(state.sheet==='surface'?null:'surface'); } },
        [el('div', { class:'tab-dot' }), el('div', { text:'Surface' })])
    ]));

    // Sheet (outside the shell so safe-area padding on shell doesn't affect it)
    app.appendChild(shell);
    app.appendChild(el('div', { class:'sheet-scrim', id:'scrim', onclick: closeSheet }));
    app.appendChild(el('div', { class:'sheet', id:'sheet' }, [
      el('div', { class:'sheet-handle' }),
      el('div', { class:'sheet-head' }, [
        el('div', { class:'sheet-title', id:'sheetTitle', text:'Controls' }),
        el('button', { class:'sheet-close', text:'Close', onclick: closeSheet })
      ]),
      el('div', { class:'sheet-body', id:'sheetBody' })
    ]));

    renderInspector();
    renderSheet();
  }

  // Close sheet on back gesture
  window.addEventListener('keydown', function(ev){
    if (ev.key === 'Escape') closeSheet();
  });

  buildApp();
})();
</script>
</body>
</html>
